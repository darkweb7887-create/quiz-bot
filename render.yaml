services:
  - type: web
    name: quiz-bot-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python api_server.py
    envVars:
      - key: PORT
        value: 10000

  - type: worker
    name: quiz-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot/bot.py
